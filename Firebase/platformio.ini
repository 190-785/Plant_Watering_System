; PlatformIO Project Configuration File for Firebase-enabled IoT Device
;
; This configuration includes all necessary libraries for:
; - WiFi connectivity
; - Firebase Realtime Database integration
; - JSON handling
; - Web server for local configuration

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino

; Library dependencies
lib_deps = 
    tzapu/WiFiManager@^0.16.0
    bblanchon/ArduinoJson@^6.21.3
    firebase/Firebase Arduino Client Library for ESP8266 and ESP32@^4.4.12
    ESP8266WiFi
    ESP8266WebServer
    ESP8266HTTPClient
    WiFiClientSecure
    LittleFS

; Build flags for Firebase Firestore support
build_flags = 
    -DESP8266
    -DFIREBASE_ENABLE_FIRESTORE
    -DFIREBASE_DISABLE_RTDB
    -DFIREBASE_DISABLE_OTA
    -DFIREBASE_DISABLE_FCM
    -DFIREBASE_DISABLE_FB_STORAGE

; Monitor settings
monitor_speed = 115200
monitor_filters = esp8266_exception_decoder
